{% extends 'base.html' %}
{% load static %}
{% load i18n %}
{% block body %}
    <div class="grid grid-cols-[15rem_auto] h-screen">
        <aside class="p-2">
            <app-state name='menu_url'></app-state>
            <ul class="menu w-full">
                <li>
                    <h2 class="menu-title">{% trans 'Schedule' %}</h2>
                    <ul>
                        <li>
                            <form is="app-ajax-form"
                                  class="relative"
                                  store='menu_1'
                                  endpoint="{% url 'schedule_view' %}">
                                {% trans 'Calendar' %}
                                <app-if data-state="menu_1.loading" data-at='value' then="it => { const status = getState('menu_1.status'); const isLoading = it === 'true'; if (status === '200' && !isLoading) { setState('menu_url', '{% url 'schedule_view' %}'); setState('menu_1.status', ''); }; return isLoading; }">
                                <span class="loading loading-xs"></span>
                                <button slot="else" class='absolute inset-0'></button>
                                </app-if>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </aside>
        <section data-state='menu_url'>
        </section>
    </div>
{% endblock %}
{% block scripts %}
    <script src="{% static 'state.js' %}"></script>
    <script src="{% static 'components.js' %}"></script>
{% endblock %}
