{% extends 'base.html' %}
{% load static %}
{% block title %}App UI Styleguide{% endblock %}
{% block style %}
    <link rel="stylesheet" href="{% static 'app.css' %}">
{% endblock %}
{% block body %}
    <app-state name="section-style" value="--minw:var(--lg);--minh:var(--xl);" at="style"></app-state>
    <app-state name="section-class" value="flex flex-col border-t min-w min-h" at="class"></app-state>
    <app-state name="section-span-style" value="--h:var(--s8);--mt:var(--s1);" at="style"></app-state>
    <app-state name="section-span-class" value="font-semibold text-md h justify-text m-t" at="class"></app-state>
    <main class="w-full h-screen bg-white bg-pattern-polka overflow-y-auto">
        <footer class="text-2xl font-semibold p-x w-full m-t"
                style="--text-2xl-lh: var(--s9)">
            App UI Styleguide
        </footer>
        <section class="p-x m-t bg-lines flex flex-wrap gap-f">
            <section data-state="section-class,section-style">
                <span data-state="section-span-class,section-span-style">Typography</span>
                <span class="text-4xl">Typography</span>
                <span class="text-3xl">Typography</span>
                <span class="text-2xl">Typography</span>
                <span class="text-xl">Typography</span>
                <span class="text-lg">Typography</span>
                <span class="text-md">Typography</span>
                <span class="text-sm">Typography</span>
                <span class="text-xs">Typography</span>
                <span class="text-2xs">Typography</span>
            </section>
            <section data-state="section-class,section-style">
                <span data-state="section-span-class,section-span-style">Sizes</span>
                <app-state name="size-class" value="bg-base-300 bg-pattern-diagonal w h" at="class"></app-state>
                <div class="flex flex-wrap gap-f">
                    <div data-state="size-class" style="--w:var(--xs);--h:var(--xs)"></div>
                    <div data-state="size-class" style="--w:var(--sm);--h:var(--xs)"></div>
                    <div data-state="size-class" style="--w:var(--md);--h:var(--xs)"></div>
                    <div data-state="size-class" style="--w:var(--lg);--h:var(--xs)"></div>
                    <div data-state="size-class" style="--w:var(--xl);--h:var(--xs)"></div>
                    <div data-state="size-class" style="--w:var(--2xl);--h:var(--xs)"></div>
                </div>
            </section>
            <section data-state="section-class,section-style">
                <span data-state="section-span-class,section-span-style">Colors</span>
                <app-state name="box-style" at="style" value="--b:var(--2xs)"></app-state>
                <div class="flex flex-wrap gap-f" style="--gf:var(--s2)">
                    <div class="box border-f bg-white" data-state="box-style"></div>
                    <div class="box border-f bg-base-50" data-state="box-style"></div>
                    <div class="box border-f bg-base-100" data-state="box-style"></div>
                    <div class="box border-f bg-base-200" data-state="box-style"></div>
                    <div class="box border-f bg-base-300" data-state="box-style"></div>
                    <div class="box border-f bg-base-400" data-state="box-style"></div>
                    <div class="box border-f bg-base-500" data-state="box-style"></div>
                    <div class="box border-f bg-base-600" data-state="box-style"></div>
                    <div class="box border-f bg-base-700" data-state="box-style"></div>
                    <div class="box border-f bg-base-800" data-state="box-style"></div>
                    <div class="box border-f bg-base-900" data-state="box-style"></div>
                    <div class="box border-f bg-black" data-state="box-style"></div>
                </div>
            </section>
        </section>
    </main>
{% endblock %}
