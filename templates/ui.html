{% extends 'base.html' %}
{% load static %}
{% block title %}
  App UI Styleguide
{% endblock %}
{% block style %}
    <link rel="stylesheet" href="{% static 'app.css' %}">
{% endblock %}
{% block body %}
<s-def name="sec" value="min-h-xs border-t-1 border-color-base-200 p-y-4"/>

<main class="size-screen bg-base-50 bg-pattern-polka">
  <footer class="text-2xl font-semibold px-4 pt-4 -mb-2">
    App UI Styleguide
  </footer>
  <section class="p-4 bg-lines grid grid-cols-2 md:grid-cols-4">
    <section data-state="sec" data-at="class">
      <span>Backgrounds</span>
    </section>
    <section data-state="sec" data-at="class"> ok </section>
  </section>
</main>

{% endblock %}
