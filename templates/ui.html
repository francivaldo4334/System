{% extends 'base.html' %}
{% load static %}
{% block title %}App UI Styleguide{% endblock %}
{% block style %}
    <link rel="stylesheet" href="{% static 'app.css' %}">
{% endblock %}
{% block body %}
    <app-state name="section-style" value="--minw:var(--md)" at="style"/>
    <app-state name="section-class" value="flex flex-col border-t min-w" at="class"/>
    <app-state name="section-span-style" value="--h:var(--s7);--py:var(--s1)" at="style" />
    <app-state name="section-span-class" value="font-semibold text-md h justify-text p-y" at="class" />

    <main class="w-screen h-screen bg-white bg-pattern-polka overflow-y-auto">
        <footer class="text-2xl font-semibold p-x w-full p-t"
                style="--text-2xl-lh: var(--s9)">
            App UI Styleguide
        </footer>
        <section class="p-x m-t bg-lines flex flex-wrap gap-f">
            <section data-state="section-class,section-style">
                <span data-state="section-span-class,section-span-style">Typography</span>
                <span class="text-4xl">Typography</span>
                <span class="text-3xl">Typography</span>
                <span class="text-2xl">Typography</span>
                <span class="text-xl">Typography</span>
                <span class="text-lg">Typography</span>
                <span class="text-md">Typography</span>
                <span class="text-sm">Typography</span>
                <span class="text-xs">Typography</span>
                <span class="text-2xs">Typography</span>
            </section>
            <section data-state="section-class,section-style">
                <span data-state="section-span-class,section-span-style">Sizes</span>
                <app-state name="size-class" value="bg-base-300 bg-pattern-diagonal w h" at="class"></app-state>
                <div class="flex flex-wrap gap-f">
                    <div data-state="size-class" style="--w:var(--xs);--h:var(--xs)"></div>
                    <div data-state="size-class" style="--w:var(--sm);--h:var(--xs)"></div>
                    <div data-state="size-class" style="--w:var(--md);--h:var(--xs)"></div>
                    <div data-state="size-class" style="--w:var(--lg);--h:var(--xs)"></div>
                    <div data-state="size-class" style="--w:var(--xl);--h:var(--xs)"></div>
                    <div data-state="size-class" style="--w:var(--2xl);--h:var(--xs)"></div>
                </div>
            </section>

            <section data-state="section-class,section-style">
                <span data-state="section-span-class,section-span-style">Colors</span>
                <div class="flex flex-wrap gap-f" style="--gf:var(--s2)">
                    <div class="box border-f bg-white" style="--b:calc(var(--2xs) - var(--spx) / 2)"></div>
                    <div class="box border-f bg-base-50" style="--b:calc(var(--2xs) - var(--spx) / 2)"></div>
                    <div class="box border-f bg-base-100" style="--b:calc(var(--2xs) - var(--spx) / 2)"></div>
                    <div class="box border-f bg-base-200" style="--b:calc(var(--2xs) - var(--spx) / 2)"></div>
                    <div class="box border-f bg-base-300" style="--b:calc(var(--2xs) - var(--spx) / 2)"></div>
                    <div class="box border-f bg-base-400" style="--b:calc(var(--2xs) - var(--spx) / 2)"></div>
                    <div class="box border-f bg-base-500" style="--b:calc(var(--2xs) - var(--spx) / 2)"></div>
                    <div class="box border-f bg-base-600" style="--b:calc(var(--2xs) - var(--spx) / 2)"></div>
                    <div class="box border-f bg-base-700" style="--b:calc(var(--2xs) - var(--spx) / 2)"></div>
                    <div class="box border-f bg-base-800" style="--b:calc(var(--2xs) - var(--spx) / 2)"></div>
                    <div class="box border-f bg-base-900" style="--b:calc(var(--2xs) - var(--spx) / 2)"></div>
                    <div class="box border-f bg-black" style="--b:var(--2xs)"></div>
                </div>
            </section>
        </section>
    </main>
{% endblock %}
