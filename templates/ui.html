{% extends 'base.html' %}
{% load static %}
{% block title %}App UI Styleguide{% endblock %}
{% block style %}
    <link rel="stylesheet" href="{% static 'app.css' %}">
{% endblock %}
{% block body %}
    <s-def name="spa" value="p-b  font-semibold text-md" />
    <s-def name="sec" value="flex flex-col border-t min-w" style="--minw:var(--xl)" />
    <main class="w-screen h-screen bg-white bg-pattern-polka overflow-y-auto">
        <footer class="text-2xl font-semibold p-x w-full p-t"
                style="--text-2xl-lh: var(--text-2xl)">
            App UI Styleguide
        </footer>
        <section class="p-x m-t bg-lines flex flex-wrap gap-f">
            <section data-state="sec" data-at="class">
                <span data-state="spa" data-at="class">Typography</span>
                <span class="text-4xl">Typography</span>
                <span class="text-3xl">Typography</span>
                <span class="text-2xl">Typography</span>
                <span class="text-xl">Typography</span>
                <span class="text-lg">Typography</span>
                <span class="text-md">Typography</span>
                <span class="text-sm">Typography</span>
                <span class="text-xs">Typography</span>
                <span class="text-2xs">Typography</span>
            </section>
            <section data-state="sec" data-at="class">
                <span data-state="spa" data-at="class">Sizes</span>
                <s-def name="size-class" value="bg-base-300 bg-pattern-diagonal w h"></s-def>
                <div class="flex flex-wrap gap-f" style="--h:var(--xs)">
                    <div data-state="size-class" data-at="class" style="--w:var(--xs)"></div>
                    <div data-state="size-class" data-at="class" style="--w:var(--sm)"></div>
                    <div data-state="size-class" data-at="class" style="--w:var(--md)"></div>
                    <div data-state="size-class" data-at="class" style="--w:var(--lg)"></div>
                    <div data-state="size-class" data-at="class" style="--w:var(--xl)"></div>
                    <div data-state="size-class" data-at="class" style="--w:var(--2xl)"></div>
                </div>
            </section>
        </section>
    </main>
{% endblock %}
