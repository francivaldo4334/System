<app-state name="f-services"></app-state>
<form is="app-ajax"
      store="q-f-services"
      action="{% url 'services-list' %}"
      autofetch>
</form>
<div data-state="q-f-services.data"
     data-then="it => FServices.render(this, JSON.parse(it))"
     data-at="innerHTML">
    <span class="loading"></span>
</div>
<div data-state="f-services,"
     data-then="it => JSON.stringify(Array.from(it))"></div>
<script is="app-scope" onclearup="delete window.FServices">
window.FServices = {
    toggleCheck(el){
      const fServices = new Set(getState('f-services'));
      const value = Number(el.value);
      const isSelected =  fServices.has(value)
      if (isSelected){
        fServices.delete(value)
        el.checked = false;
      }
      else {
        fServices.add(value)
        el.checked = true;
      }
      setState('f-services', fServices)
    },
    render(el, data){
      if (!data?.results) return;
      const htmlContent = data.results.map(it => `
        <label class="label w-full">
          <input type="checkbox" name="service" value="${it.id}" class="checkbox checkbox-xs checkbox-primary" checked onclick="FServices.toggleCheck(this)" />
          <span class="label-text text-sm">${this.escapeHtml(it.title)}</span>
        </label>
      `).join('')
      setState('f-services', new Set(data.results.map(it => it.id)))
      return htmlContent;
    },
    escapeHtml(str){
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
}
</script>
