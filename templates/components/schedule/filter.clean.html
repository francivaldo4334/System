<button class="btn btn-sm [&>svg]:w-4 hidden sm:flex" id="id_btn_clear_filters">
    {% trans 'Clear filters' %}
    {% include 'icons/funnel-x.svg'%}
</button>
<script>
    id_btn_clear_filters.onclick = () => {
        $s.set('filter.search', '');
        $s.set('filter.service', '');
        $s.set('filter.resource', '');
        $s.set('filter.resource_type', '');
        $s.set('filter.status', '');
    }
</script>
