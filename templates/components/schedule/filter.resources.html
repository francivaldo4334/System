<label for="id_filter_resource" class="floating-label">
    <select class="select" id="id_filter_resource" onchange="$s.set('filter.resources', this.value)"> </select>
    <span>{% trans "Resource"%}</span>
</label>
<script is="exec-mount" type="text/template">
$q.use(
    'resources-list',
    ()=>fetch("{% url 'resources-list' %}").then(r => r.json()),
    {
        onSuccess:(data)=> {
            const frag = document.createDocumentFragment()
            const options = data.results.map(it => {
                const opt = document.createElement('option')
                opt.value = it.id
                opt.innerText = it.name
                frag.appendChild(opt)
            });
            const opt = document.createElement('option')
            opt.value = ""
            opt.innerText = "{% trans 'Show All Resources' %}"
            frag.appendChild(opt)
            id_filter_resource.replaceChildren(frag)
        }
    },
)
</script>
