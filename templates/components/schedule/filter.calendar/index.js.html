<script is="app-scope" onclearup="FilterCalendar.clean()" type="text/javascript">
FilterCalendar = {
  clean(){
  	delete FilterCalendar
  },
	init(){
    this.loadWeekDays()
    window.addEventListener('state:update', (event) => {
      const { key, newValue } = event.detail
      if (!key.startsWith('filter.calendar')) return
      this.loadCalendarMonth()
      this.loadGridDays()
    })
	},
  _getDay() {
    return new Date(getState('filter.calendar.day'))
  },
  _getDateRange() {
    const [isoStart, isoEnd] = getState("filter.calendar.range") || [];
    if (!isoStart || !isoEnd) return [null, null];
    return [new Date(isoStart), new Date(isoEnd)];
  },
  _normalize(date) {
    return new Date(date).setHours(0, 0, 0, 0);
  },
  _isSameDay(d1, d2) {
    return this._normalize(d1) === this._normalize(d2);
  },
  _isInRange(currentDate, init, end) {
    if (!init || !end || !currentDate) return false;
    const d = this._normalize(currentDate);
    const start = this._normalize(init);
    const finish = this._normalize(end);
    return d >= start && d <= finish;
  },

  _buildDayButton(day, isToday, isSelected, inRange) {
    const baseClass = 'btn btn-sm btn-square font-normal transition-colors';
    const rangeClass = inRange ? 'btn-soft btn-primary' : '';
    const todayClass = isToday ? '!btn-outline' : 'btn-ghost';
    const activeClass = isSelected ? 'btn-primary btn-active' : '';
    return `
  <button class="${baseClass} ${todayClass} ${activeClass} ${rangeClass}" onclick="FilterCalendar.selectDay(${day});">
  ${day}
  </button>`.trim();
  },
  setToday() {
    setState('filter.calendar.day', new Date().toISOString())
  },
  selectDay(day) {
    const date = this._getDay();
    date.setDate(day);
    setState('filter.calendar.day', date.toISOString());
  },
  changeMonth(step) {
    const date = this._getDay()
    date.setDate(1);
    date.setMonth(date.getMonth() + step);
    setState('filter.calendar.day', date.toISOString());
  },

  formatHeader(iso, lang) {
    const date = new Date(iso);
    return new Intl.DateTimeFormat(lang, { month: 'long', year: 'numeric' }).format(date);
  },

  loadGridDays() {
    const gridDays = document.getElementById('calendar-grid-days')
    const date = this._getDay();
    const today = new Date();
    const year = date.getFullYear();
    const month = date.getMonth();
    const firstDayIndex = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const range = this._getDateRange();
    const emptyCells = Array(firstDayIndex).fill('<div data-empty></div>');
    const dayButtons = Array.from({ length: daysInMonth }, (_, i) => {
      const day = i + 1;
      const currentDate = new Date(year, month, day);
      const isToday = this._isSameDay(today, currentDate);
      const isSelected = date.getDate() === day;
      const inRange = this._isInRange(currentDate, ...range);
      return this._buildDayButton(day, isToday, isSelected, inRange);
    });
    gridDays.innerHTML = [...emptyCells, ...dayButtons].join('');
  },
  loadWeekDays() {
    const container = document.getElementById('calendar-weekdays');
    const formatter = new Intl.DateTimeFormat(this.locale, { weekday: 'short' });
    const daysHtml = Array.from({ length: 7 }, (_, i) => {
      const d = new Date(2024, 0, 7 + i);
      const name = formatter.format(d).replace('.', '');
      return `<span>${name}</span>`;
    }).join('');
    container.innerHTML = daysHtml;
  },
  loadCalendarMonth() {
    const titleMonth = document.getElementById('calendar-month-title')
    const day = getState('filter.calendar.day')
    titleMonth.textContent = this.formatHeader(day, '{{ LANG_CODE }}')
  },
}
FilterCalendar.init()
</script>
