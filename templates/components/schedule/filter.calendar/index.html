{% get_current_language as LANG_CODE %}
<section class="flex flex-col gap-2 relative  h-[calc(8*2rem)]">
    <header class="flex items-center justify-between gap-2">
        <span class="text-sm font-bold capitalize" id="id-filter-calendar-header"></span>
        <div class="flex gap-1">
            <button data-dir="-1" class="btn-filter-calendar btn btn-ghost btn-sm btn-square" >{% include 'icons/chevron-left.svg' %}</button>
            <button data-dir="1" class="btn-filter-calendar btn btn-ghost btn-sm btn-square" >{% include 'icons/chevron-right.svg' %}</button>
        </div>
    </header>
    <div class="grid grid-cols-7 text-center text-xs font-bold opacity-50 uppercase"
         id="calendar-weekdays"></div>
    <c-days></c-days>
    <button class="btn btn-neutral btn-xs absolute bottom-2 right-0"
            onclick="$s.set('filter.calendar.day', new Date().toISOString())">{% trans "Today" %}</button>
</section>
<script>
createComponent('c-days', {
  html: '<div class="calendar-grid"></div>',
  methods: {
    onMount(){
      const c = this.$(".calendar-grid")
      $s.subscribe(
        'filter.calendar.day', c,
        'innerHTML',
        (v)=>{
          return this.render(new Date(v))
        }
      )
      const iso = $s.get("filter.calendar.day")
      if (!iso) return;
      const date = new Date(iso)
      c.innerHTML = this.render(date)
    },
    _normalize(date) {
        return new Date(date).setHours(0, 0, 0, 0);
    },
    _isSameDay(d1, d2) {
        return this._normalize(d1) === this._normalize(d2);
    },
    _isInRange(currentDate, init, end) {
        if (!init || !end || !currentDate) return false;
        const d = this._normalize(currentDate);
        const start = this._normalize(init);
        const finish = this._normalize(end);
        return d >= start && d <= finish;
    },
    _buildDayButton(day, isToday, isSelected, inRange) {
        const btn = document.createElement('button');
        btn.textContent = day;
        if (isToday) btn.type = 'today'
        if (isSelected) btn.type = 'selected'
        if (inRange) btn.type = 'range'
        btn.onclick = ()=> {
          console.log("hire")
          this.selectDay(day)
        }
        return btn.outerHTML;
    },
    _getDateRange() {
        const [isoStart, isoEnd] = $s.get("filter.calendar.range") || [];
        if (!isoStart || !isoEnd) return [null, null];
        return [new Date(isoStart), new Date(isoEnd)];
    },
    selectDay(day) {
        const date = this._getDay();
        date.setDate(day);
        $s.set('filter.calendar.day', date.toISOString());
    },
    render(date){
      const gridDays = this.$('.calendar-grid')
      const today = new Date();
      const year = date.getFullYear();
      const month = date.getMonth();
      const firstDayIndex = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const range = this._getDateRange();
      const emptyCells = Array(firstDayIndex).fill('<div type="empty"></div>');
      const dayButtons = Array.from({length: daysInMonth}, (_, i) => {
          const day = i + 1;
          const currentDate = new Date(year, month, day);
          const isToday = this._isSameDay(today, currentDate);
          const isSelected = date.getDate() === day;
          const inRange = this._isInRange(currentDate, ...range);
          return this._buildDayButton(day, isToday, isSelected, inRange);
      });
      return [...emptyCells, ...dayButtons].join('');
    }
  }
})
document.querySelectorAll('.btn-filter-calendar').forEach(el => {
  el.onclick = () => {
    const iso = $s.get("filter.calendar.day")
    if (!iso) return;
    const date = new Date(iso)
    const step = Number(el.dataset.dir)
    date.setDate(1);
    date.setMonth(date.getMonth() + step);
    $s.set('filter.calendar.day', date.toISOString());
  }
})
{
  let ch = document.querySelector('#id-filter-calendar-header')
  const lang = '{{ LANG_CODE }}';
  const formatter = new Intl.DateTimeFormat(lang, {month: 'long', year: 'numeric'})
  $s.subscribe('filter.calendar.day', ch, 'textContent', (v)=>{
    const date = new Date(v)
    return formatter.format(date)
  })
  const date = new Date($s.get('filter.calendar.day'))
  ch.textContent =  formatter.format(date)
}
</script>
