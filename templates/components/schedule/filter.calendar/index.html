{% get_current_language as LANG_CODE %}
<section class="flex flex-col gap-2 relative  h-[calc(8*2rem)]">
    <header class="flex items-center justify-between gap-2">
        <h2 id="calendar-month-title" class="text-sm font-bold capitalize"></h2>
        <div class="flex gap-1">
            <button class="btn btn-ghost btn-sm btn-square"
                    onclick="FilterCalendar.changeMonth(-1)">{% include 'icons/chevron-left.svg' %}</button>
            <button class="btn btn-ghost btn-sm btn-square"
                    onclick="FilterCalendar.changeMonth(1)">{% include 'icons/chevron-right.svg' %}</button>
        </div>
    </header>
    <div class="grid grid-cols-7 text-center text-xs font-bold opacity-50 uppercase"
         id="calendar-weekdays"></div>
    <div id="calendar-grid-days" class="calendar-grid"></div>
    <button class="btn btn-neutral btn-xs absolute bottom-2 right-0"
            onclick="FilterCalendar.setToday()">{% trans "Today" %}</button>
</section>
{% include 'components/schedule/filter.calendar/index.js.html' %}
