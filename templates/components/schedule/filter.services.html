<label for="id-filter-services" class="floating-label">
    <select class="select" id="id-filter-services" onchange="$s.set('filter.services', this.value)"> </select>
    <span>{% trans 'Service' %}</span>
</label>
<script is="exec-mount" type="text/template">
$q.use(
    'services-list',
    "{% url 'services-list' %}",
    {
        onSuccess:(data)=> {
            const el = document.getElementById('id-filter-services')
            const options = data.results.map(it => 
                `<option value="${it.id}">${it.title}</option>`
            ).join('');
            el.innerHTML = `<option value="">{% trans 'Show All Services' %}</option>` + options;
        }
    },
)
</script>
