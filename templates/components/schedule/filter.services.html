<select class="select" id="id-filter-services" onchange="$s.set('filter.services', this.value)">
    <option selected>
        {%trans 'Show All Services'%}
    </option>
</select>
<script>
$q.use(
    'get-schedule-services',
    "{% url 'services-list' %}",
    {
        onSuccess:(data)=> {
            const options = data.results.map(it => 
                `<option value="${it.id}">${it.title}</option>`
            ).join('');
            el.innerHTML = `<option value="">{% trans 'Show All Services' %}</option>` + options;
        }
    },
)
</script>
