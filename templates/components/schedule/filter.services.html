<label for="id_filter_service" class="floating-label min-w-3xs">
    <select class="select select-sm" id="id_filter_service" onchange="$s.set('filter.service', this.value)"> </select>
    <span>{% trans 'Service' %}</span>
</label>
<script is="exec-mount" type="pass">
$q.use(
    ['services-list'],
    ()=>$r.get("{% url 'services-list' %}"),
    {
        onSuccess:(data)=> {
            const frag = document.createDocumentFragment()
            const opt = document.createElement('option')
            opt.value = ""
            opt.innerText = "{% trans 'Show All' %}"
            frag.appendChild(opt)
            const options = data.results.map(it => {
                const opt = document.createElement('option')
                opt.value = it.id
                opt.innerText = it.label
                frag.appendChild(opt)
            });
            id_filter_service.replaceChildren(frag)
        },
        onFinally(){
            $s.subscribe('filter.service',id_filter_service, 'value')
        }
    },
)
</script>
