<template id="tmpl_assignment_slot">
    <app-slot class="preview-slot">
        <button class="w-full h-full">
        </button>
    </app-slot>
</template>

<script is="exec-mount" type="pass">
    $s.subscribe("filter_query_params", null, null, (queryparams) => {
        $q.use(["assignments-list", queryparams], () => {
            return $r.get(`{% url 'assignment-list'%}?${queryparams}`);
        }, {
            onSuccess(data) {
                const items = []
                data?.results?.forEach(av => {
                    items.push({
                        start: av.start_slot,
                        duration: av.duration_slot,
                    })
                })
                $u.renderList("assignment_slots", id_timeline_preview, items, (it) => {
                    const clone = tmpl_assignment_slot.content.cloneNode(true);
                    const slot = clone.querySelector('app-slot');
                    slot.setAttribute('start', it.start);
                    slot.setAttribute('duration', it.duration);
                    const btn = slot.querySelector("button");
                    //btn.innerText = it.description
                    btn.innerText = "ok"
                    return clone;
                })
            }
        }, {
            enableRefetch: true,
            ttl:0,
        });
    })
</script>
