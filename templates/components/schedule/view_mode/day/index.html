<div class="grid grid-rows-[auto_1fr] max-h-full overflow-y-auto" style="--tab-space:70px">
    <header> </header>
    <div class="overflow-y-auto max-h-full snap-y">
        <app-timeline id="id_schedule_timeline" slotunit="24px" class="w-full bg-pattern-paper">
        </app-timeline>
    </div>
</div>
{%include "components/schedule/view_mode/day/loadtimeinfo.js.html" with id_timeline="id_schedule_timeline"%}
<script is="exec-mount" type="pass">
$s.subscribe("filter.calendar.range", null, null, (range) => {
    $q.use(
        "availabilities_presentation",
        () => {
            const [init, end] = range.split(",").map(it => it.split("T")[0])
            return fetch(`{% url 'availabilities_presentation'%}?date_start=${init}&date_end=${end}`)
                .then(r => r.json())
                .then(data => {
                    console.log(data)
                })
        },
        {
            onSuccess(data) {
            }
        },
        { ttl: 0 }
    );
})
$q.use(
    "assignment-list",
    () => fetch("{% url 'assignment-list'%}")
        .then(r => r.json())
        .then(data => {
            const format = (m) => `${String(Math.floor(m / 60)).padStart(2, '0')}:${String(m % 60).padStart(2, '0')}`;
            return data.results.map(it => {
                const startMin = (it.start_slot - 1) * 5;
                const endMin = ((it.start_slot - 2) + it.duration_slot) * 5;
                return `
                    <app-slot start="${it.start_slot}" duration="${it.duration_slot}" class="appointment-slot">
                        <span>${it.service.title}</span>
                        <div class="flex items-center gap-2">
                            <span class="w-4">{% include 'icons/clock.svg' %}</span>
                            <span>${format(startMin)} - ${format(endMin)}</span>
                        </div>
                    </app-slot>`;
            }).join('');
        }),
    {
        onSuccess(appointmentsHTML) {
            if (!id_schedule_timeline) return;
            id_schedule_timeline.querySelectorAll('.appointment-slot').forEach(e => e.remove());
            id_schedule_timeline.insertAdjacentHTML('beforeend', appointmentsHTML);
        }
    },
    { ttl: 10000 }
);
</script>
