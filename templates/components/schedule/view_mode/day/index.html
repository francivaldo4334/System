<app-timeline id="id-app-timeline" slotunit="20px" class='w-full'>
</app-timeline>
<script>
    $q.use(
        "assignment-list",
        "{% url 'assignment-list'%}",
        {
            onSuccess: (data) => {
                const el = document.getElementById('id-app-timeline')
                const frag = document.createDocumentFragment()
                data.results.forEach(it => {
                    const slot = document.createElement("app-slog")
                    slot.setAttribute("start", it.start_slot)
                    slot.setAttribute("duration", it.duration_slot)
                    frag.appendChild(slot)
                })
                el.appendChild(frag)
            }
        }
    )
</script>
