<div class="grid grid-rows-[auto_1fr] max-h-full overflow-y-auto" style="--tab-space:70px">
    <header> </header>
    <div class="overflow-y-auto max-h-full snap-y">
        <app-timeline id="id-app-timeline" slotunit="24px" class="w-full bg-pattern-paper">
        </app-timeline>
    </div>
</div>
<script>
    {
        const el = document.getElementById('id-app-timeline');
        const slotInterval = 5;
        const totalMinutesInDay = 1440;
        const totalSlots = totalMinutesInDay / slotInterval;
        const frag = document.createDocumentFragment();
        for (let i = 0; i < totalSlots; i++) {
            const slot = document.createElement("app-slot");
            slot.setAttribute('start', i + 1);
            slot.setAttribute('duration', 1);
            slot.classList.add('slot-time-label');
            const currentMinute = i * slotInterval;
            const hours = Math.floor(currentMinute / 60);
            const minutes = currentMinute % 60;
            slot.innerHTML = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            frag.appendChild(slot);
        }

        el.querySelectorAll('.slot-time-label').forEach(e => e.remove())
        el.append(frag);
    }
    $q.use(
        "assignment-list",
        "{% url 'assignment-list'%}",
        {
            onSuccess: (data) => {
                function minutesToTime(currentMinutes) {
                    const hours = Math.floor(currentMinutes / 60);
                    const minutes = currentMinutes % 60;
                    return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`
                }

                const el = document.getElementById('id-app-timeline')
                el.querySelectorAll(':not(.slot-time-label)').forEach(e => e.remove())
                const frag = document.createDocumentFragment()
                data.results.forEach(it => {
                    const slot = document.createElement("app-slot")
                    slot.setAttribute("start", it.start_slot)
                    slot.setAttribute("duration", it.duration_slot)
                    slot.classList.add("appointment-slot")
                    const startTime = minutesToTime(((it.start_slot - 1) * 5))
                    const endTime = minutesToTime(((it.start_slot - 2) + it.duration_slot) * 5)
                    slot.innerHTML = `
                        <span>${it.service.title}</span>
                        <div class="flex items-center gap-2">
                            <span class='*:w-4'> {% include 'icons/clock.svg' %} </span>
                            <span>
                                ${startTime} - ${endTime}
                            </span>
                        </div>
                    `
                    frag.appendChild(slot)
                })
                el.appendChild(frag)
            }
        }
    )
</script>
