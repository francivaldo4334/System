{%extends "components/form/fields/base.html"%}
{%block field%}
<select class="select" id="{{key}}_{{field.id}}" name="{{field.name}}" data-url-name="{{field.url_name}}" {{field.attrs}}></select>
{%if field.url_name%}
<script is="exec-mount" type="pass">
$q.use(
    "{{field.id}}_{{field.url_name}}",
    ()=> $r.get("{% url field.url_name|add:'-list' %}{{field.url_query_params}}"),
    {
        onSuccess(data){
            const items = data.results;
            const el = document.getElementById("{{key}}_{{field.id}}")
            const defaultItems = []
            if (!el?.multiple) {
                defaultItems.push({id:"", label: "{%trans 'Select a value.'%}"})
            }
            $u.renderList("{{id}}",el, [
                ...defaultItems,
                ...items
            ], (it)=>{
                const opt = document.createElement("option")
                opt.value = it.id;
                opt.innerText = it.label||"";
                return opt
            })
        },
    },
    {
        ttl:3000
    }
)
</script>

{%endif%}
{%endblock%}
