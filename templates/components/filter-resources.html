<app-state name="f-resources"></app-state>
<form is="app-ajax"
      store="q-f-resources"
      action="{% url 'resources-list' %}"
      autofetch>
</form>
<div data-state="q-f-resources.data"
     data-then="it => FResources.render(this, JSON.parse(it))"
     data-at="innerHTML">
    <span class="loading"></span>
</div>
<div data-state="f-resources"
     data-then="it => it ? JSON.stringify(Array.from(it)) : ''"></div>
<script is="app-scope" onclearup="delete window.FResources">
    window.FResources = {
        getTemplate(it){
            if (it.is_selectable){
                this.fResources.add(it.id);
                return `
                    <label class="label w-full">
                        <input type="checkbox" name="resource" value="${it.id}" class="checkbox checkbox-xs checkbox-primary" />
                        <span class="label-text text-sm">${this.escapeHtml(it.name)}</span>
                    </label>
                `;
            }

            return `
            <details class="group/item" open>
                <summary class="flex items-center cursor-pointer list-none text-sm font-semibold py-2 text-base-content/70 hover:text-base-content transition-colors">
                    <span class="mr-2 transition-transform group-open/item:rotate-90">&#9658;</span>
                    ${this.escapeHtml(it.name)}
                </summary>
                <div class="pl-4 border-l border-base-content/5 ml-1">
                    %
                </div>
            </details>
            `;
        },
        buildHTML(it){
            return this.getTemplate(it).replace('%', it.children.map(i => this.buildHTML(i)).join(''))
        },
        render(el, data) {
            this.fResources = new Set([]);
            if (!data?.results) return;
            const htmlContent = data.results.map(it => this.buildHTML(it)).join("")
            setState('f-resources', this.fResources);
            return htmlContent;
        },

        escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    }
</script>
