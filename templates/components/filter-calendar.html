{% get_current_language as LANG_CODE %}
<section class="flex flex-col gap-2 relative  h-[calc(8*2rem)]">
    <header class="flex items-center justify-between gap-2">
        <h2 class="text-sm font-bold capitalize"
            data-state="f-calendar"
            data-then="iso => CalendarApp.formatHeader(iso, '{{ LANG_CODE }}')"></h2>
        <div class="flex gap-1">
            <button class="btn btn-ghost btn-sm btn-square"
                    onclick="CalendarApp.changeMonth(-1)">{% include 'icons/chevron-left.svg' %}</button>
            <button class="btn btn-ghost btn-sm btn-square"
                    onclick="CalendarApp.changeMonth(1)">{% include 'icons/chevron-right.svg' %}</button>
        </div>
    </header>
    <div class="grid grid-cols-7 text-center text-xs font-bold opacity-50 uppercase"
         id="calendar-weekdays"></div>
    <div id="calendar-grid"
         class="grid grid-cols-7"
         data-state="f-calendar"
         data-at="innerHTML"
         data-then="CalendarApp.renderGrid"></div>
    <button class="btn btn-neutral btn-xs absolute bottom-2 right-0"
            onclick="setState('f-calendar', new Date().toISOString())">{% trans "Today" %}</button>
</section>
<script is="app-scope" oncleanup="delete window.CalendarApp">
  window.CalendarApp = {
    locale: '{{ LANG_CODE|default:"en" }}',

    // --- Helpers de Estado e Data ---
    _getCurrentDate() {
      const iso = getState('f-calendar');
      return iso ? new Date(iso) : new Date();
    },

    formatHeader(iso, lang) {
      const date = new Date(iso);
      return new Intl.DateTimeFormat(lang, { month: 'long', year: 'numeric' }).format(date);
    },

    // --- Ações ---
    changeMonth(step) {
      const date = this._getCurrentDate();
      // Ajuste crítico: setar dia 1 evita pular meses se hoje for dia 31
      date.setDate(1); 
      date.setMonth(date.getMonth() + step);
      setState('f-calendar', date.toISOString());
    },

    selectDay(day) {
      const date = this._getCurrentDate();
      date.setDate(day);
      setState('f-calendar', date.toISOString());
    },

    // --- Renderização ---
    initWeekDays() {
      const container = document.getElementById('calendar-weekdays');
      if (!container) return;

      const formatter = new Intl.DateTimeFormat(this.locale, { weekday: 'short' });
      
      // Cria os nomes dos dias (baseado em um domingo fixo: 2024-01-07)
      const daysHtml = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(2024, 0, 7 + i);
        const name = formatter.format(d).replace('.', '');
        return `<span>${name}</span>`;
      }).join('');

      container.innerHTML = daysHtml;
    },

    renderGrid(iso) {
      const date = new Date(iso);
      const today = new Date();
      
      const year = date.getFullYear();
      const month = date.getMonth();

      const firstDayIndex = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      // Gerar células vazias
      const emptyCells = Array(firstDayIndex).fill('<div class="p-2"></div>');

      // Gerar botões dos dias
      const dayButtons = Array.from({ length: daysInMonth }, (_, i) => {
        const day = i + 1;
        const isToday = this._isSameDay(today, new Date(year, month, day));
        const isSelected = date.getDate() === day;

        return this._buildDayButton(day, isToday, isSelected);
      });

      return [...emptyCells, ...dayButtons].join('');
    },

    // --- Sub-componentes (Privados por convenção) ---
    _isSameDay(d1, d2) {
      return d1.getDate() === d2.getDate() &&
             d1.getMonth() === d2.getMonth() &&
             d1.getFullYear() === d2.getFullYear();
    },

    _buildDayButton(day, isToday, isSelected) {
      const config = {
        base: 'btn btn-sm btn-square font-normal transition-colors',
        state: isToday ? 'btn-outline' : 'btn-ghost',
        active: isSelected ? 'btn-primary btn-active' : ''
      };

      const classes = Object.values(config).join(' ');
      
      return `
        <button class="${classes}" onclick="CalendarApp.selectDay(${day})" aria-pressed="${isSelected}">
          ${day}
        </button>`.trim();
    }
  };

  window.CalendarApp.initWeekDays();
</script>
