{% get_current_language as LANG_CODE %}
<section class="flex flex-col gap-2 relative  h-[calc(8*2rem)]">
    <header class="flex items-center justify-between gap-2">
        <h2 class="text-sm font-bold capitalize"
            data-state="f-calendar"
            data-then="iso => CalendarApp.formatHeader(iso, '{{ LANG_CODE }}')"></h2>
        <div class="flex gap-1">
            <button class="btn btn-ghost btn-sm btn-square"
                    onclick="CalendarApp.changeMonth(-1)">{% include 'icons/chevron-left.svg' %}</button>
            <button class="btn btn-ghost btn-sm btn-square"
                    onclick="CalendarApp.changeMonth(1)">{% include 'icons/chevron-right.svg' %}</button>
        </div>
    </header>
    <div class="grid grid-cols-7 text-center text-xs font-bold opacity-50 uppercase"
         id="calendar-weekdays"></div>
    <div id="calendar-grid"
         class="grid grid-cols-7"
         data-state="f-calendar"
         data-at="innerHTML"
         data-then="CalendarApp.renderGrid"></div>
    <button class="btn btn-neutral btn-xs absolute bottom-2 right-0"
            onclick="setState('f-calendar', new Date().toISOString())">{% trans "Today" %}</button>
</section>
<script is="app-scope" oncleanup="delete window.CalendarApp">
  window.CalendarApp = {
    locale: '{{ LANG_CODE|default:"en" }}',
    formatHeader(iso, lang) {
      return new Intl.DateTimeFormat(lang, { month: 'long', year: 'numeric' }).format(new Date(iso));
    },
    changeMonth(step) {
      const current = new Date(getState('f-calendar'));
      current.setMonth(current.getMonth() + step);
      setState('f-calendar', current.toISOString());
    },
    selectDay(day) {
      const d = new Date(getState('f-calendar'));
      d.setDate(day);
      setState('f-calendar', d.toISOString());
    },
    initWeekDays() {
      const container = document.getElementById('calendar-weekdays');
      if (!container) return;
      
      const baseDate = new Date(2024, 0, 7);
      let html = '';
      for (let i = 0; i < 7; i++) {
        const d = new Date(baseDate);
        d.setDate(baseDate.getDate() + i);
        const name = new Intl.DateTimeFormat(this.locale, { weekday: 'short' }).format(d);
        html += `<span>${name.replace('.', '')}</span>`;
      }
      container.innerHTML = html;
    },
    renderGrid(iso) {
      const d = new Date(iso);
      const today = new Date();
      const year = d.getFullYear(), month = d.getMonth();
      
      const firstDayIndex = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      let html = '';
      for (let x = 0; x < firstDayIndex; x++) html += `<div class="p-2"></div>`;
      for (let day = 1; day <= daysInMonth; day++) {
        const isToday = today.getDate() === day && today.getMonth() === month && today.getFullYear() === year;
        const isSelected = d.getDate() === day;
        
        const classes = [
          'btn btn-sm btn-square font-normal',
          isToday ? 'btn-outline' : 'btn-ghost',
          isSelected ? 'btn-primary btn-active' : ''
        ].join(' ');

        html += `<button class="${classes}" onclick="CalendarApp.selectDay(${day})">${day}</button>`;
      }
      return html;
    }
  };
  window.CalendarApp.initWeekDays();
</script>
