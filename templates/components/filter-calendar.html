{% load i18n %}
<app-state name="f-calendar" value="{% now 'c' %}"></app-state>
<section class="flex flex-col gap-2">
  <header class="flex items-center justify-between gap-2">
    <h2 class="text-sm font-bold capitalize" 
        data-state="f-calendar"
        data-then="iso => new Intl.DateTimeFormat('{{LANG_CODE}}', { month: 'long', year: 'numeric' }).format(new Date(iso))">
    </h2>
    <div class="flex gap-1">
      <button class="btn btn-ghost btn-xs btn-square" onclick="changeMonth(-1)">
        {% include 'icons/chevron-left.svg' %}
      </button>
      <button class="btn btn-ghost btn-xs btn-square" onclick="changeMonth(1)">
        {% include 'icons/chevron-right.svg' %}
      </button>
    </div>
  </header>
  <div class="grid grid-cols-7 text-center text-[10px] font-bold opacity-50 uppercase"
     id="calendar-weekdays">
  </div>

  <div id="calendar-grid"
       class="grid grid-cols-7 gap-1"
       data-state="f-calendar"
       data-at="innerHTML"
       data-then="renderCalendar">
  </div>
</section>
<button class="btn btn-outline btn-sm w-full" onclick="setState('f-calendar', new Date().toISOString())">
  {% trans "Today" %}
</button>
<script>
  function changeMonth(step) {
    const current = new Date(getState('f-calendar'));
    current.setMonth(current.getMonth() + step);
    setState('f-calendar', current.toISOString());
  }

  function renderCalendar(iso) {
    const d = new Date(iso);
    const today = new Date();
    const year = d.getFullYear(), month = d.getMonth();
    
    const firstDayIndex = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    
    let html = '';

    for (let x = 0; x < firstDayIndex; x++) {
      html += `<div class="p-2"></div>`;
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const isToday = today.getDate() === day && today.getMonth() === month && today.getFullYear() === year;
      const isSelected = d.getDate() === day;
      
      const classes = [
        'btn btn-sm btn-square text-xs',
        isToday ? 'btn-outline' : 'btn-ghost',
        isSelected ? 'btn-primary btn-active' : ''
      ].join(' ');

      html += `
        <button class="${classes}" onclick="selectDay(${day})">
          ${day}
        </button>`;
    }
    return html;
  }

  function selectDay(day) {
    const d = new Date(getState('f-calendar'));
    d.setDate(day);
    setState('f-calendar', d.toISOString());
  }
  function renderWeekDays(locale) {
    const container = document.getElementById('calendar-weekdays');
    const baseDate = new Date(2024, 0, 7);
    const weekdays = [];

    for (let i = 0; i < 7; i++) {
      const d = new Date(baseDate);
      d.setDate(baseDate.getDate() + i);
      const dayName = new Intl.DateTimeFormat(locale, { weekday: 'short' }).format(d);
      weekdays.push(`<span>${dayName.replace('.', '')}</span>`);
    }

    container.innerHTML = weekdays.join('');
  }

  renderWeekDays('{{ LANG_CODE }}');
</script>
