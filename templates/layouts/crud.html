<header class="pb-4 flex justify-between">
    {%block header%}
    {%endblock%}
    <button class="btn" onclick="{{key}}_modal.showModal()">
        {% include "icons/plus.svg" %}
        {% trans "Add" %}
    </button>
</header>
<table class="table table-zebra">
    <thead>
        {%block table_thead%}
        {%endblock%}
    </thead>
    <tbody id="{{key}}_table_tbody">
    </tbody>
</table>
<script is="exec-umount" type="pass">
    delete renderChild;
</script>
{%block render_child%}
{%endblock%}
<script is="exec-mount" type="pass">
$q.use(
"{{key|add:'-list'}}",
()=>$r.get("{%url key|add:'-list'%}"),
{
    onSuccess(data){
        const items = data.results;
        const el = document.getElementById("{{key}}_table_tbody")
        $u.renderList("{{key}}_render", el, items, renderChild);
    }
},
{ ttl: 0, enableRefetch: true}
)
</script>
<dialog id="{{key}}_modal" class="modal">
    {%block modal_box%}
    {%endblock%}
</dialog>
