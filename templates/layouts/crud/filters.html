<label class="input input-sm">
    {% include "icons/search.svg" %}
    <input type="search" placeholder="{% trans 'Search' %}..." id="id_{{key}}_filter_search" />
</label>
<script is="exec-umount" type="pass">
$s.remove("{{key}}.filters")
</script>
<script is="exec-mount" type="pass">
$s.createStore("{{key}}.filters", {
  "search": "",
})
{
  let filter_search_id = null
  document.getElementById("id_{{key}}_filter_search").oninput = (event) => {
    clearTimeout(filter_search_id)
    filter_search_id = setTimeout(()=>{
      $s.set("{{key}}.filters.search", event.target.value)
    }, 300)
  }
  
}
</script>
