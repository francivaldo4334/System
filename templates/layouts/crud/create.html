<div class="max-sm:fab">
    <button class="btn btn-sm btn-primary" onclick="document.getElementById('id_{{key}}_btn_add_modal').showModal()">
        {% include "icons/plus.svg" %}
        {% trans "Add" %}
    </button>
</div>
<script is="exec-mount" type="pass">
    {
        const form = document.getElementById("id_{{key}}_create_form");
        if (form) {
            form._handlerCreate = (event) => {
                event.preventDefault();
                const data = $u.getDataByForm(event.target);
                let url = "";
                {%if request.GET.key%}
                url = "{% url create.post_url_name resource_code=request.GET.key %}",
                {%else%}
                url = "{% url create.post_url_name %}",
                {%endif%}
                $q.use("{{create.post_url_name}}",
                    () => $r.post(
                        url,
                        data,
                        {"X-CSRFToken": "{{csrf_token}}"},
                    ),
                    {
                        onSuccess() {
                            {% if list %}
                            $q.refetch("{{list.table.list_url_name}}");
                            {% endif %}
                            document.getElementById("id_{{key}}_btn_add_modal")?.close();
                            form.reset();
                        },
                        onError(error) {
                            if (error.status < 500 && error.status >= 400) {
                                Object.entries(error.data).forEach(([key, value]) => {
                                    const field = form.elements[key];
                                    if (field) {
                                        const message = Array.isArray(value) ? value.join(', ') : value;

                                        field.setCustomValidity(message);
                                        field.reportValidity();

                                        field.addEventListener('input', () => {
                                            field.setCustomValidity('');
                                        }, {once: true});
                                    } else {
                                        toastError(value);
                                    }
                                });
                            } else {
                                toastError("{% trans 'Error' %}!");
                            }
                        }
                    }
                );
            };

            form.addEventListener("submit", form._handlerCreate);
        }
        //Mdoal
        const modal = document.getElementById('id_{{key}}_btn_add_modal');
        if (modal) {
            modal.onclose = () => {
                form.reset();
            }
        }
    }
</script>
<script is="exec-umount" type="pass">
{
    const form = document.getElementById("id_{{key}}_create_form");
    if (form && form._handlerCreate) {
        form.removeEventListener("submit", form._handlerCreate);
        delete form._handlerCreate; // Limpeza completa da propriedade
    }
}
</script>

<dialog id="id_{{key}}_btn_add_modal" class="modal">
    <div class="modal-box">
        <h3 class="text-xl font-bold mb-6 text-base-content">
            {{modal_create_title|default:_('Add new item')}}
        </h3>
        {% with form=create.form id="id_"|add:key|add:"_create_form" %}
        {% include "components/form/index.html" %}
        {% endwith %}
        <div class="modal-action">
            <form method="dialog">
                <button class="btn btn-sm btn-ghost"
                    onclick="document.getElementById('id_{{key}}_create_form')?.reset()">
                    {% trans "Cancel" %}
                </button>
            </form>
            <button class="btn btn-primary btn-sm"
                onclick="document.getElementById('id_{{key}}_create_form')?.requestSubmit()">
                {% trans "Save" %}
            </button>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button></button>
    </form>
</dialog>
