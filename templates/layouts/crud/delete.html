<template id="id_template_btn_delete">
    <button class="btn btn-ghost btn-square tooltip"
        onclick="$s.set('delete.modal.id', this.dataset.id);id_delete_modal.showModal()"
        data-tip="{% trans 'Delete' %}">
        {% include "icons/trash-2.svg" %} </button>
</template>

<dialog id="id_delete_modal" class="modal" onclose="$s.set('delete.modal.id', '')">
    <form class="modal-box border-t-4 border-error">
        <h3 class="font-bold text-lg flex items-center gap-2">
            {% trans "Confirm Exclusion" %}
        </h3>

        <p class="py-4 text-sm opacity-70">
            {% trans "This action cannot be undone. Are you sure you want to delete this item?" %}
        </p>

        <div class="modal-action">
            <button value="cancel" class="btn btn-sm btn-ghost" type="button" onclick="id_delete_modal.close()">
                {% trans "Cancel" %}
            </button>

            <button value="confirm" class="btn btn-sm btn-error" type="submit">
                {% trans "Delete" %}
            </button>
        </div>
    </form>

    <form method="dialog" class="modal-backdrop">
        <button>close</button>
    </form>
</dialog>
<script is="exec-umount" type="pass">
{
    $s.remove("delete.modal.id");
    const deleteForm = document.querySelector("#id_delete_modal form");    
    if (deleteForm && deleteForm._handlerDeleteForm) {
        deleteForm.removeEventListener("submit", deleteForm._handlerDeleteForm);
        deleteForm._handlerDeleteForm = null;
    }
}
</script>
<script is="exec-mount" type="pass">
{
    $s.create("delete.modal.id", "");
    const modal = document.getElementById("id_delete_modal");
    const deleteForm = modal?.querySelector("form");
    if (deleteForm) {
        deleteForm._handlerDeleteForm = (event) => {
            event.preventDefault();            
            const currentId = $s.get("delete.modal.id");
            if (!currentId) return;
            $q.use(
                "{{delete.delete_url_name}}",
                () => $r.delete(
                    "{% url delete.delete_url_name 0 %}".replace("0", currentId),
                    { "X-CSRFToken": "{{csrf_token}}" }
                ),
                {
                    onSuccess() {
                        {% if list %}
                        $q.refetch("crud_{{list.table.list_url_name}}");
                        {% endif %}
                        modal.close();
                    }
                },
                { ttl: 0 }
            );
        };

        deleteForm.addEventListener("submit", deleteForm._handlerDeleteForm);
    }
}
</script>
