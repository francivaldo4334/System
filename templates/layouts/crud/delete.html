<template id="id_template_btn_delete">
    <button class="btn btn-xs btn-error btn-square *:w-4"
        onclick="$s.set('delete.modal.id', this.dataset.id);id_delete_modal.showModal()">
        {% include "icons/trash-2.svg" %} </button>
</template>

<dialog id="id_delete_modal" class="modal">
    <form class="modal-box border-t-4 border-error">
        <h3 class="font-bold text-lg flex items-center gap-2">
            {% trans "Confirm Exclusion" %}
        </h3>

        <p class="py-4 text-sm opacity-70">
            {% trans "This action cannot be undone. Are you sure you want to delete this item?" %}
        </p>

        <div class="modal-action">
            <button value="cancel" class="btn btn-sm btn-ghost" type="button" onclick="id_delete_modal.close()">
                {% trans "Cancel" %}
            </button>

            <button value="confirm" class="btn btn-sm btn-error" type="submit">
                {% trans "Delete" %}
            </button>
        </div>
    </form>

    <form method="dialog" class="modal-backdrop">
        <button>close</button>
    </form>
</dialog>
<script is="exec-umount" type="pass">
    $s.remove("delete.modal.id")
    id_delete_modal.removeEventListener("close", handlerCloseCancelModal)
    handlerCloseCancelModal = null
    deleteForm.removeEventListener("submit", handlerDeleteForm)
    deleteForm = null
</script>
<script is="exec-mount" type="pass">
    $s.create("delete.modal.id", "")
    let handlerCloseCancelModal = () => {
        $s.set("delete.modal.id", "")
    }
    id_delete_modal.addEventListener("close", handlerCloseCancelModal)
    let deleteForm = id_delete_modal.querySelector("form")
    let handlerDeleteForm = (event)=>{
        event.preventDefault();
        $q.use(
            "{{delete.delete_url_name}}",
            () => $r.delete(
                "{% url delete.delete_url_name 0 %}".replace("0", $s.get("delete.modal.id")),
                {
                    "X-CSRFToken": "{{csrf_token}}"
                }
            ),
            {
                onSuccess(){
                    {%if list%}
                    $q.refetch("{{list.table.list_url_name}}")
                    {%endif%}
                    id_delete_modal.close()
                }
            },
            {ttl:0}
        )
    }
    deleteForm.addEventListener("submit", handlerDeleteForm)
</script>
