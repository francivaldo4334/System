<template id="id_template_btn_update">
    <button class="btn btn-ghost btn-square tooltip"
        onclick="$s.set('update.modal.id', this.dataset.id);id_update_modal.showModal()" data-tip="{% trans 'Edit' %}">
        {% include "icons/square-pen.svg" %} </button>
</template>
<dialog id="id_update_modal" class="modal">
    <div class="modal-box">
        {% with form=create.form id="id_"|add:key|add:"_update_form" %}
        {% include "components/form/index.html" %}
        {% endwith %}
        <div class="modal-action">
            <form method="dialog">
                <button class="btn btn-ghost" onclick="id_{{key}}_update_form.reset()">
                    {% trans "Cancel" %}
                </button>
            </form>
            <button class="btn btn-primary" onclick="id_{{key}}_update_form.requestSubmit()">
                {% trans "Save" %}
            </button>
        </div>
    </div>
    <form class="modal-backdrop" method="dialog">
        <button></button>
    </form>
</dialog>
<script is="exec-umount" type="pass">
$s.remove("update.modal.id")
const form = document.getElementById("id_{{key}}_update_form");
if (form && form._handlerUpdate) {
    form.removeEventListener("submit", form._handlerUpdate);
    delete form._handlerUpdate;
}
</script>
<script is="exec-mount" type="pass">
{
    $s.create("update.modal.id", null)
    $s.subscribe("update.modal.id", null, null, (value,el) => {
        if (!value) return
        const form = document.getElementById("id_{{key}}_update_form")
        $q.use("{{update.update_url_name}}", () => $r.get("{% url update.update_url_name 0 %}".replace("0", value)), {
            onSuccess(data){
                Object.keys(data).forEach(key => {
                    const field = form.elements[key];
                    if (field){
                        const fieldGroup = Array.from(field)
                        if (fieldGroup.length && field.tagName !== "SELECT") {
                            fieldGroup.forEach(field => {
                                field.checked = data[key].map(String).includes(field.value)
                            })
                        } else if (field.type === "checkbox") {
                            field.checked = data[key];
                        } else {
                            field.value = data[key];
                        }
                    }
                })
            }
        })
    })
    const form = document.getElementById("id_{{key}}_update_form");
    if (form){
        form._handlerUpdate = (event) => {            
            event.preventDefault();
            const data = $u.getDataByForm(event.target);
            $q.use(
                '{{update.update_url_name}}',
                () => $r.put(
                    '{% url update.update_url_name 0 %}'.replace(
                        "0",
                        $s.get('update.modal.id'),
                    ),
                    data,
                    {'X-CSRFToken': '{{csrf_token}}'}
                ),
                {
                    onSuccess(){
                        {% if list %}
                            $q.refetch('{{list.table.list_url_name}}');
                        {% endif %}
                        document.getElementById('id_update_modal')?.close();
                    },
                    onError(error){
                        if (error.status === 400) {
                            toastError(Object.entries(error.data)
                                .map(([k, v]) => `${k}: ${v}`).join("\n"));
                        } else {
                            toastError("{%trans 'Error'%}!");
                        }                        
                    }
                }
            )
        };
        form.addEventListener('submit', form._handlerUpdate);
    }
}
</script>
