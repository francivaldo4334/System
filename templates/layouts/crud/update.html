<template id="id_template_btn_update">
    <button class="btn btn-ghost btn-square tooltip"
        onclick="$s.set('update.modal.id', this.dataset.id);id_update_modal.showModal()" data-tip="{% trans 'Edit' %}">
        {% include "icons/square-pen.svg" %} </button>
</template>
<dialog id="id_update_modal" class="modal">
    <div class="modal-box">
        <h3 class="text-xl font-bold mb-6 text-base-content">
            {{modal_update_title|default:_('Update item')}}
        </h3>
        {% with form=update.form id="id_"|add:key|add:"_update_form" %}
        {% include "components/form/index.html" %}
        {% endwith %}
        <div class="modal-action">
            <form method="dialog">
                <button class="btn btn-ghost" onclick="id_{{key}}_update_form.reset()">
                    {% trans "Cancel" %}
                </button>
            </form>
            <button class="btn btn-primary" onclick="id_{{key}}_update_form.requestSubmit()">
                {% trans "Save" %}
            </button>
        </div>
    </div>
    <form class="modal-backdrop" method="dialog">
        <button></button>
    </form>
</dialog>
<script is="exec-umount" type="pass">
{
    const form = document.getElementById("id_{{key}}_update_form");
    if (form && form?._handlerUpdate) {
        form.removeEventListener("submit", form._handlerUpdate);
        delete form._handlerUpdate;
    }    
}
</script>
<script is="exec-mount" type="pass">
    {
        $s.remove("update.modal.id")
        $s.create("update.modal.id", null)
        $s.subscribe("update.modal.id", null, null, (value, el) => {
            if (!value) return
            const form = document.getElementById("id_{{key}}_update_form")
            $q.use("{{update.update_url_name}}", () => $r.get(
            {%if request.GET.key %}
                "{% url update.update_url_name pk=0 resource_code=request.GET.key %}"
            {%else%}
                "{% url update.update_url_name 0 %}"
            {% endif %}
            .replace("0", value)), {
        // onSuccess(data) {
        //     Object.keys(data).forEach(key => {
        //         const field = form.elements[key];
        //         if (field) {
        //             const fieldGroup = Array.from(field)
        //             if (fieldGroup.length && field.tagName !== "SELECT") {
        //                 fieldGroup.forEach(field => {
        //                     field.checked = data[key].map(String).includes(field.value)
        //                 })
        //             } else if (field.type === "checkbox") {
        //                 field.checked = data[key];
        //             } else {
        //                 field.value = data[key];
        //             }
        //         }
        //     })
        // }
        onSuccess(data) {
            Object.keys(data).forEach(key => {
                const field = form.elements[key];
                if (!field) return; // Cláusula de guarda para evitar erros se o campo não existir

                // 1. Trata grupos de elementos (como RadioNodeList de checkboxes ou inputs de mesmo nome)
                const fieldGroup = Array.from(field);
                if (fieldGroup.length && field.tagName !== "SELECT") {
                    fieldGroup.forEach(f => {
                        f.checked = data[key].map(String).includes(f.value);
                    });
                }
                // 2. Trata especificamente o SELECT MULTIPLE
                else if (field.tagName === "SELECT" && field.multiple) {
                    const values = Array.isArray(data[key]) ? data[key].map(String) : [String(data[key])];
                    Array.from(field.options).forEach(option => {
                        option.selected = values.includes(option.value);
                    });
                }
                // 3. Trata Checkbox único (Booleano)
                else if (field.type === "checkbox") {
                    field.checked = !!data[key];
                }
                // 4. Trata inputs text, hidden, select simples, textarea, etc.
                else {
                    field.value = data[key];
                }
            });
        }
    })
        })
    const form = document.getElementById("id_{{key}}_update_form");
    if (form) {
        form._handlerUpdate = (event) => {
            event.preventDefault();
            const data = $u.getDataByForm(event.target);
            $q.use(
                '{{update.update_url_name}}',
                () => $r.put(
                    {%if request.GET.key %}
        '{% url update.update_url_name pk=0 resource_code=request.GET.key%}'
        {%else%}
        '{% url update.update_url_name 0 %}'
        {% endif %}
                        .replace(
            "0",
            $s.get('update.modal.id'),
        ),
            data,
            {'X-CSRFToken': '{{csrf_token}}'}
                    ),
        {
            onSuccess() {
                {% if list %}
                $q.refetch('{{list.table.list_url_name}}');
                {% endif %}
                document.getElementById('id_update_modal')?.close();
            },
            onError(error) {
                if (error.status === 400) {
                    Object.entries(error.data).forEach(([key, value]) => {
                        const field = form.elements[key];
                        if (field) {
                            const message = Array.isArray(value) ? value.join(', ') : value;

                            field.setCustomValidity(message);
                            field.reportValidity();

                            field.addEventListener('input', () => {
                                field.setCustomValidity('');
                            }, {once: true});
                        } else {
                            toastError(value);
                        }
                    });
                } else {
                    toastError("{% trans 'Error' %}!");
                }
            }
        }
                )
    };
    form.addEventListener('submit', form._handlerUpdate);
        }
    }
</script>
