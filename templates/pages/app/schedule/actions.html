{% partialdef btn_action %}
    <button class="btn">{{text}}</button>
{% endpartialdef %}
{% partialdef modal %}
<dialog class="modal" id="id_modal_assignment_action_{{status}}">
    <div class="modal-box">
        <div class="modal-action">
            <button class="btn btn-outline" onclick="id_modal_assignment_action_{{status}}.close();">
                {% trans 'Close' %}
            </button>
        </div>
    </div>
    <form class="modal-backdrop" method="dialog">
        <button></button>
    </form>
</dialog>
{% endpartialdef %}
{% with status='PD' %}
    {% partial modal %}
{% endwith %}
{% with status='CF' %}
    {% partial modal %}
{% endwith %}
