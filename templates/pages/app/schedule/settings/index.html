{% extends 'pages/app/layout.html' %}
{% partialdef main %}
{% include 'components/appbar.html' with title=_('RSA Agenda') %}
<section class="w-full flex">
    <main class="max-w-[1080px] w-full mx-auto grid grid-rows-[auto_1fr]">
        <div class="tabs tabs-border px-2" id="id_schedule_settings_tabs">
            {%for opt in setting_tabs%}
            <input name="schedule_settings_tab" type="radio" class="tab" aria-label="{{opt.label}}"
                data-url="{%url opt.url_name%}" data-url-name="{{opt.url_name}}" />
            {%endfor%}
        </div>
        <div id="id_schedule_settings_content">
        </div>
    </main>
</section>
<script is="exec-mount" type="pass">
$s.create("settings.tab", "{{request.GET.tab|default:setting_tag_selected}}")
id_schedule_settings_tabs.querySelectorAll("input").forEach(item => {
    item.onclick = (event) => {
        $s.set('settings.tab',event.target.dataset.urlName)
    }
    $s.subscribe("settings.tab", item, "checked", (v, el) => {
        const isSelected = v === el.dataset.urlName
        el.disabled = isSelected
        if (isSelected) {
            $q.use(el.dataset.urlName, () => fetch(item.dataset.url).then(r => r.text()), {
                onSuccess(html){
                    id_schedule_settings_content.innerHTML = html
                    history.pushState({}, "", location.pathname + `?tab=${el.dataset.urlName}`)
                }
            })
        }
        return isSelected
    })

})
</script>
{% endpartialdef %}
{% block section %}
{% partial main %}
{% endblock %}
