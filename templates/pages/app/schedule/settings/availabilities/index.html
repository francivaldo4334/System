<header class="pb-4 flex justify-between">
    <label class="input">
        {% include 'icons/search.svg' %}
        <input type="search" placeholder="{% trans " Search" %}..." />
    </label>
    <button class="btn" onclick="id_new_availability_modal.showModal()">
        {% include "icons/plus.svg" %}
        {% trans "Add" %}
    </button>
</header>
<div class="overflow-x-auto rounded-box border border-base-content/5 bg-base-100">
    <table class="table">
        <!-- head -->
        <thead>
            <tr>
                <th></th>
                <th>Name</th>
                <th>Job</th>
                <th>Favorite Color</th>
            </tr>
        </thead>
        <tbody>
            <!-- row 1 -->
            <tr>
                <th>1</th>
                <td>Cy Ganderton</td>
                <td>Quality Control Specialist</td>
                <td>Blue</td>
            </tr>
            <!-- row 2 -->
            <tr>
                <th>2</th>
                <td>Hart Hagerty</td>
                <td>Desktop Support Technician</td>
                <td>Purple</td>
            </tr>
            <!-- row 3 -->
            <tr>
                <th>3</th>
                <td>Brice Swyre</td>
                <td>Tax Accountant</td>
                <td>Red</td>
            </tr>
        </tbody>
    </table>
</div>
<dialog id="id_new_availability_modal" class="modal" open>
    <div class="modal-box">
        <h3 class="text-lg font-bold">{% trans "New Availability" %}</h3>
        <form onreset="id_new_availability_modal.close()" class="flex flex-col gap-6 p-4">
            <fieldset class="form-continuous-inputs">
                <label>Disponibilidade de</label>
                <input type="date" name="start_date">
                <label>até o dia</label>
                <input type="date" name="until_date">
            </fieldset>
            <fieldset class="form-continuous-inputs">
                <label>Repetir todas as:</label>
                <div class="join flex-wrap">
                    <input type="checkbox" class="btn btn-sm join-item" aria-label="Seg" />
                    <input type="checkbox" class="btn btn-sm join-item" aria-label="Ter" />
                    <input type="checkbox" class="btn btn-sm join-item" aria-label="Qua" />
                    <input type="checkbox" class="btn btn-sm join-item" aria-label="Qui" />
                    <input type="checkbox" class="btn btn-sm join-item" aria-label="Sex" />
                    <input type="checkbox" class="btn btn-sm join-item" aria-label="Sáb" />
                    <input type="checkbox" class="btn btn-sm join-item" aria-label="Dom" />
                </div>
            </fieldset>
            <fieldset class="form-continuous-inputs">
                <label>No horário das</label>
                <input type="time" name="start_time">
                <label>até às</label>
                <input type="time" name="until_time">
            </fieldset>
            <fieldset class="form-continuous-inputs">
                <label>Dividir em sessões de</label>
                <input type="time" name="duration_slot">
                <label>com pausas de</label>
                <input type="time" name="interfal_slot">
                <label>entre elas.</label>
            </fieldset>

            <div class="modal-action mt-4">
                <button type="reset" class="btn btn-ghost">Cancelar</button>
                <button type="submit" class="btn btn-primary px-8">Confirmar Agenda</button>
            </div>
        </form>

    </div>
</dialog>
