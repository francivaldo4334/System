<header class="pb-4 flex justify-between">
    <label class="input">
        {% include 'icons/search.svg' %}
        <input type="search" placeholder="{% trans " Search" %}..." />
    </label>
    <button class="btn" onclick="id_new_availability_modal.showModal()">
        {% include "icons/plus.svg" %}
        {% trans "Add" %}
    </button>
</header>
<div class="overflow-x-auto rounded-box border border-base-content/5 bg-base-100">
    <table class="table">
        <!-- head -->
        <thead>
            <tr>
                <th></th>
                <th>Name</th>
                <th>Job</th>
                <th>Favorite Color</th>
            </tr>
        </thead>
        <tbody>
            <!-- row 1 -->
            <tr>
                <th>1</th>
                <td>Cy Ganderton</td>
                <td>Quality Control Specialist</td>
                <td>Blue</td>
            </tr>
            <!-- row 2 -->
            <tr>
                <th>2</th>
                <td>Hart Hagerty</td>
                <td>Desktop Support Technician</td>
                <td>Purple</td>
            </tr>
            <!-- row 3 -->
            <tr>
                <th>3</th>
                <td>Brice Swyre</td>
                <td>Tax Accountant</td>
                <td>Red</td>
            </tr>
        </tbody>
    </table>
</div>
<dialog id="id_new_availability_modal" class="modal" open>
    <div class="modal-box">
        <h3 class="text-lg font-bold">{% trans "New Availability" %}</h3>
        <form onreset="id_new_availability_modal.close()" class="flex flex-col gap-4">
            <fieldset class="grid grid-cols-[auto_1fr_auto_1fr] gap-4">
                <label class="label">De:</label>
                <input type="date" class="input" name="start_date">
                <label class="label">Até:</label>
                <input type="date" class="input" name="until_date">
            </fieldset>
            <feldset class="flex gap-4">
                <label class="label">
                    Dias da Semana:
                </label>
                <div class="join flex-wrap">
                    <input type="checkbox" class="btn btn-sm join-item" aria-label="Seg" />
                    <input type="checkbox" class="btn btn-sm join-item" aria-label="Seg" />
                    <input type="checkbox" class="btn btn-sm join-item" aria-label="Seg" />
                    <input type="checkbox" class="btn btn-sm join-item" aria-label="Seg" />
                    <input type="checkbox" class="btn btn-sm join-item" aria-label="Seg" />
                    <input type="checkbox" class="btn btn-sm join-item" aria-label="Seg" />
                    <input type="checkbox" class="btn btn-sm join-item" aria-label="Seg" />
                </div>
            </feldset>
            <fieldset class="grid grid-cols-[auto_1fr_auto_1fr] gap-4">
                <label class="label"> Horarios de: </label>
                <input type="time" class="input input-bordered" name="start_time">
                <label class="label"> até ás: </label>
                <input type="time" class="input input-bordered" name="until_time">
            </fieldset>
            <fieldset class="grid grid-cols-[auto_1fr_auto_1fr] gap-4">
                <label class="label"> Sessões de:</label>
                <input type="time" class="input" name="duration_slot">
                <label class="label"> Em intervalos de:</label>
                <input type="time" class="input" name="interfal_slot">
            </fieldset>

            <div class="modal-action">
                <button type="reset" class="btn btn-ghost">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
        </form>
    </div>
</dialog>
