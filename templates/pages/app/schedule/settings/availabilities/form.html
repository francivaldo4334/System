<form onreset="id_new_availability_modal.close()" class="" id="id_availability_form">
    {%include "pages/app/schedule/settings/availabilities/form.fields.html"%}
    <div class="modal-action mt-4">
        <button type="reset" class="btn btn-ghost">{%trans "Cancel"%}</button>
        <button type="submit" class="btn btn-primary px-8">{%trans "Save"%}</button>
    </div>
</form>
<script is="exec-mount" type="pass">
        id_availability_form.addEventListener("submit", el => {
            el.preventDefault();
            const formData = new FormData(id_availability_form)
            const data = Object.fromEntries(formData.entries())
            data.week = formData.getAll('week')
            function parse(input) {
                const dayMap = { "1": "MO", "2": "TU", "3": "WE", "4": "TH", "5": "FR", "6": "SA", "7": "SU" };
                const days = input.week.map(d => dayMap[d]).join(",");
                const startDate = input.start_date.replace(/-/g, "");
                const untilDate = input.until_date.replace(/-/g, "");
                const startTime = input.start_time.replace(":", "") + "00";
                const untilTime = input.until_time.replace(":", "") + "00";
                const [hours, minutes] = input.duration_slot.split(":").map(Number);
                const totalMinutes = (hours * 60) + minutes;
                const slotsOfFive = Math.floor(totalMinutes / 5);
                return {
                    resource: parseInt(input.resource, 10),
                    rrule_params: `DTSTART:${startDate}T${startTime}\nRRULE:FREQ=WEEKLY;BYDAY=${days};UNTIL=${untilDate}T${untilTime}`,
                    duration_slot: slotsOfFive
                };
            }

            console.log(parse(data))
        })
</script>
