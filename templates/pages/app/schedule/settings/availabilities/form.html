{%include 'components/form/index.html'%}
<div class="modal-action mt-4">
    <button class="btn btn-ghost" onclick="id_availability_form.reset();availabilities_modal.close()">{%trans "Cancel"%}</button>
    <button class="btn btn-primary px-8" onclick="id_availability_form.submit()">{%trans "Save"%}</button>
</div>

<script is="exec-umount" type="pass">
        $s.remove("av")
</script>
<script is="exec-mount" type="pass"> {
    $s.createStore("av", {
        resource_type: "",
    })
    const FieldStrategies = {
        resource_type: (value, state) => {
        console.log("ok")
        }
    }
    $s.subscribe("av.*", null, null, (value,_,name) => {
        const field = name.split(".")[1]
        if (FieldStrategies[field]) {
            FieldStrategies[field](value, $s.get("av"));
        }
    })
}</script>
<script is="exec-mount" type="pass">
        id_availability_form.addEventListener("submit", el => {
            el.preventDefault();
            const formData = new FormData(id_availability_form)
            const data = Object.fromEntries(formData.entries())
            data.week = formData.getAll('week')
            const getSlotOfFive = (value) => {
                const [hours, minutes] = value.split(":").map(Number);
                return Math.floor(((hours * 60) + minutes)/5);
            }
            const parse = (input) => {
                const dayMap = { "1": "MO", "2": "TU", "3": "WE", "4": "TH", "5": "FR", "6": "SA", "7": "SU" };
                const days = input.week.map(d => dayMap[d]).join(",");
                const date = input.start_date.replace(/-/g, "");
                const startTime = input.start_time.replace(":", "") + "00";
                const untilTime = input.until_time.replace(":", "") + "00";
                const description = input.description
                const duration = getSlotOfFive(input.duration_slot)
                const interval = getSlotOfFive(input.interval_slot)
                const intervalRrule = (duration + interval) * 5
                return {
                    resource: parseInt(input.resource, 10),
                    rrule_params: `DTSTART:${date}T${startTime}\nRRULE:FREQ=MINUTELY;UNTIL=${date}T${untilTime};INTERVAL=${intervalRrule};BYDAY=${days}`,
                    valid_until: input.until_date,
                    duration_slot: duration,
                    interval_slot: interval,
                    description,
                };
            }
            $q.use(
                "availabilities-create",
                ()=>$r.post(
                    "{%url 'availabilities-list'%}",
                    parse(data),
                    { "X-CSRFToken": "{{csrf_token}}" }
                ),
                {
                    onSuccess(data){
                        id_new_availability_modal.close()
                        $q.refetch('availabilities-list')
                    },
                    onError(err){
                        console.error(err)
                    }
                }
            )
        })
</script>
