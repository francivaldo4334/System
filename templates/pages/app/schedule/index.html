{% extends 'pages/app/layout.html' %}
{% partialdef main %}
{% include 'components/appbar.html' with title=_('RSA Agenda') %}
<app-state name="filter.calendar.range"></app-state>
<app-state name="filter.calendar.day" value="{{ request.GET.day|default:today }}"></app-state>
<app-state name="filter.calendar.mode" value="{{ request.GET.mode|default:'w' }}"></app-state>
<app-state name="filter.search" value="{{ request.GET.search|default:'' }}"></app-state>
<app-state name="filter.services" value="{{ request.GET.services|default:'' }}"></app-state>
<app-state name="filter.resources" value="{{ request.GET.resources|default:'' }}"></app-state>
<app-state name="filter.status" value="request.GET.status|default:'all'"></app-state>
<script is="app-scope" onclearup="window.removeEventListener('state:update', _computeFilterCalendarRange);delete _computeFilterCalendarRange">
    const _computeFilterCalendarRange = (event) => {
        const { key } = event.detail
        if (!['filter.calendar.day','filter.calendar.mode'].includes(key)) return
        const day = getState('filter.calendar.day')
        const mode = getState('filter.calendar.mode')
        if (!day || !mode) return
        const date = new Date(day);
        const range = [undefined, undefined]
        if (mode == 'm') {
            range[0] = new Date(date.getFullYear(), date.getMonth(), 1);
            range[1] = new Date(date.getFullYear(), date.getMonth() + 1, 0);
        } else if (mode === 'w'){
            const dayOfWeek = date.getDay();
            range[0] = new Date(date);
            range[0].setDate(date.getDate() - dayOfWeek);
            range[1] = new Date(range[0]);
            range[1].setDate(range[0].getDate() + 6);
        } else if (mode === 'd') {
            range[0] = new Date(date);
            range[1] = new Date(date);
        }
        setState('filter.calendar.range', range)
    };

    window.addEventListener('state:update', _computeFilterCalendarRange);
</script>
{% endpartialdef %}
{% block section %}
    {% partial main %}
{% endblock %}
