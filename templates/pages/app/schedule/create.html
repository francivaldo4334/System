<dialog id="id_new_schedule_modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box max-w-2xl p-0 overflow-hidden"> <!-- Aumentado para 2xl para o grid -->
        
        <!-- Header com Abas ou Progressão -->
        <div class="px-6 py-4 border-b border-base-300 flex justify-between items-center bg-base-200/50">
            <div>
                <h3 class="font-bold text-lg">{% trans 'Create appointment' %}</h3>
                <p class="text-xs opacity-60">{% trans 'Select a professional or resource available' %}</p>
            </div>
            <button class="btn btn-sm btn-circle btn-ghost" onclick="id_new_schedule_modal.close()">✕</button>
        </div>

        <div class="px-6">
            <!-- Formulário de Detalhes (Oculto até selecionar recurso ou integrado) -->
            <form id="id_assignment_form" class="space-y-4 border-t border-base-200 pt-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 [&>label]:label [&>select]:select">
                    {# with id='id_assignment_form' form=assignment_form #}
                        {# include 'components/form/index.html' #}
                    {# endwith #}
                    <label> {% trans "Service"%} </label>
                    <select id="id_service__add_asg"></select>
                    <fieldset class="fieldset col-span-2" id="id_fieldset__add_asg">
                    <legend class="fieldset-legend"> {% trans "Resources"%} </legend>
                    </fieldset>
                </div>
            </form>
        </div>

        <!-- Footer Fixo -->
        <div class="p-4 bg-base-200/50 border-t border-base-300 flex justify-end gap-2">
            <button class="btn btn-ghost" onclick="id_new_schedule_modal.close()">{% trans 'Cancelar' %}</button>
            <button id="btn_save_assignment" class="btn btn-primary min-w-[140px]" onclick="id_assignment_form.requestSubmit();">
                <span id="save_spinner" class="loading loading-spinner hidden"></span>
                {% trans 'Confirmar' %}
            </button>
        </div>
    </div>
    <form class="modal-backdrop" method="dialog"><button>close</button></form>
</dialog>
<script is="exec-umount" type="pass">
{
    $s.remove("form_assignment")
    const form = document.getElementById('id_assignment_form')
    if (form && form._handlerSubmit) {
        form.removeEventListener("submit", form._handlerSubmit);
        delete form._handlerSubmit;
    }
}
</script>
<script is="exec-mount" type="pass">
{
    $s.createStore("form_assignment", {
        'availability_id': 0,
        'start_slot': 0,
        'duration_slot': 0,
    })
    const form = document.getElementById('id_assignment_form')
    if (form){
        form._handlerSubmit = (event) => {
            event.preventDefault();
            const data = $u.getDataByForm(event.target);
            const storeData = $s.get('form_assignment')
            const date = $s.get("filter.calendar.day")
            data.duration_slot = storeData.duration_slot;
            data.start_slot = storeData.start_slot;
            data.availability = storeData.availability_id;
            data.date = date?.split('T')?.[0];
            $q.use(
                ['post-assignment'],
                () => $r.post("{% url 'assignment-list' %}", data, {
                    "X-CSRFToken": "{{csrf_token}}"
                }),
                {
                    onSuccess(error){
                        form.reset();
                        id_new_schedule_modal.close();
                        $q.refetch("slots")
                    },
                    onError(error){
                        if (error.status !== 400) {
                            toastError("{% trans 'Error' %}!");
                            return
                        }

                        Object.entries(error.data).forEach(([key, value]) => {
                            const field = form.elements[key];
                            if (!field) {
                                toastError(value);
                            }
                            else {
                                const message = Array.isArray(value) ? value.join(', ') : value;
                                toastError(message)
                                //field.setCustomValidity(message);
                                //field.reportValidity();

                                //field.addEventListener('change',() => {
                                //    field.setCustomValidity('');
                                //}, {once: true});
                            }
                        });
                    }
                },
                {
                    ttl:0,
                }
            )
        }
        form.addEventListener('submit', form._handlerSubmit);
    }
    const modal = document.getElementById('id_new_schedule_modal')
    if (modal){
        modal.onclose = () => {
            form.reset();
        }
    }
}
</script>
