<dialog id="id_new_schedule_modal" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box max-w-xl p-0 overflow-hidden border border-base-300">

        <!-- Header -->
        <div class="px-6 py-5 border-b border-base-300 flex justify-between items-center bg-base-200/30">
            <div>
                <h3 class="font-bold text-xl text-base-content">{% trans 'Create appointment' %}</h3>
                <p class="text-xs text-base-content/60 mt-0.5">{% trans 'Select a professional or resource available' %}
                </p>
            </div>
            <button class="btn btn-sm btn-circle btn-ghost text-base-content/70 hover:text-base-content *:w-4"
                onclick="id_new_schedule_modal.close()">
                {% include 'icons/x.svg'%}
            </button>
        </div>

        <!-- Corpo do Formulário -->
        <div class="p-6 max-h-[70vh] overflow-y-auto">
            <form id="id_assignment_form" class="space-y-5">

                <!-- Seleção de Serviço Principal -->
                <div class="form-control w-full">
                    <label class="label pt-0" for="id_service__add_asg">
                        <span class="label-text font-semibold text-base-content/80">{% trans "Service" %}</span>
                    </label>
                    <select required id="id_service__add_asg"
                        class="select select-bordered w-full focus:select-primary transition-all">
                        <!-- Injetado via JS -->
                    </select>
                </div>

                <!-- Container de Recursos Dinâmicos -->
                <fieldset class="fieldset border rounded-xl border-base-300 p-4 bg-base-200/10"
                    id="id_fieldset__add_asg">
                    <legend class="fieldset-legend font-semibold text-sm px-2 text-primary">
                        {% trans "Required Resources" %}
                    </legend>

                    <!-- Grid corrigido para os filhos injetados -->
                    <div id="id_form_resources" class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full mt-2">
                        <!-- O JS atual injeta <label> e <select> soltos. 
                             Abaixo nas observações explico como otimizar o JS para este grid. -->
                    </div>
                </fieldset>

            </form>
        </div>

        <!-- Footer Fixo -->
        <div class="px-6 py-4 bg-base-200/40 border-t border-base-300 flex justify-end items-center gap-3">
            <button class="btn btn-ghost JSON btn-sm" onclick="id_new_schedule_modal.close()">
                {% trans 'Cancelar' %}
            </button>
            <button id="btn_save_assignment" class="btn btn-primary min-w-[140px] shadow-md shadow-primary/20 btn-sm"
                onclick="id_assignment_form.requestSubmit();">
                <span id="save_spinner" class="loading loading-spinner hidden"></span>
                {% trans 'Confirmar' %}
            </button>
        </div>
    </div>
    <form class="modal-backdrop" method="dialog"><button>close</button></form>
</dialog>
<script is="exec-umount" type="pass">
{
    $s.remove("form_assignment")
    const form = document.getElementById('id_assignment_form')
    if (form && form._handlerSubmit) {
        form.removeEventListener("submit", form._handlerSubmit);
        delete form._handlerSubmit;
    }
}
</script>
<script is="exec-mount" type="pass">
{
    $s.createStore('create_asg_form',{
        'service': null,
        'resources': {},
    })
    $q.use(
        ['services'],
        () => $r.get('{% url "services-list" %}'),
        {
            onSuccess(data){
                const select = document.getElementById('id_service__add_asg')
                const frag = document.createDocumentFragment()
                const option = document.createElement('option')

                option.value = ''
                option.innerText = "{% trans 'Select a value'%}"
                option.selected = true
                option.disabled = true
                frag.appendChild(option)

                data.results.map(it => {
                    const option = document.createElement('option')
                    option.value = it.id
                    option.innerText = it.label
                    option.onclick = () => {
                        $s.set("create_asg_form.service", it)
                    }
                    frag.appendChild(option)
                })

                select.replaceChildren(frag)
            }
        }
    )
    $s.subscribe('create_asg_form.service', null, null, async (data) => {
        const content = document.getElementById('id_form_resources')
        if (!data) {
            $s.set("create_asg_form.resources", {})
            content.innerHTML = ` 
                <span class="w-full text-lg text-center p-2 col-span-2">
                    {% trans 'Select a service'%}
                </span>
            `
            return
        }
        const frag = document.createDocumentFragment()
        data?.service_resource_relation.forEach(it => {
            const parentName = it.resource_type_name
            const parentId = it.resource_type

            const label = document.createElement('label')
            label.innerText = parentName
            label.classList.add('label')

            frag.appendChild(label)

            const select = document.createElement('select')
            select.classList.add('select')
            select.id = `id_resource_type_${it.resource_type}`
            select.required = true
            select.onchange = (e)=> {
                let resources = $s.get('create_asg_form.resources')
                const value = e.target.value
                if (value === "") {
                    delete resources[parentId]
                } else {
                    resources[parentId] = value
                }
                $s.set('create_asg_form.resources', resources)
            }
            try {
                $r.get(`{% url "resources-list" %}?parent=${it.resource_type}`)
                .then(data => {
                    const select = document.getElementById(`id_resource_type_${it.resource_type}`)
                    const frag = document.createDocumentFragment()
                    const option = document.createElement('option')
                    option.value = ''
                    option.innerText = "{% trans 'Select a value'%}"
                    option.disabled = true
                    option.selected = true
                    frag.appendChild(option)
                    data.results.forEach(it => {
                        const option = document.createElement('option')
                        option.value = it.id
                        option.innerText = it.name
                        frag.appendChild(option)
                    })
                    select.replaceChildren(frag)
                })
            } catch(e) {}
            frag.appendChild(select)
        })
        content.replaceChildren(frag)
    })
    $s.createStore("form_assignment", {
        'availability_id': 0,
        'start_slot': 0,
        'duration_slot': 0,
    })
    const form = document.getElementById('id_assignment_form')
    if (form){
        form._handlerSubmit = (event) => {
            event.preventDefault();
            const data = {
                service: $s.get('create_asg_form.service')?.id || 0,
                resources: $s.get('create_asg_form.resources') ? Object.values($s.get('create_asg_form.resources')) : [] ,
            }
            const storeData = $s.get('form_assignment')
            const date = $s.get("filter.calendar.day")
            data.duration_slot = storeData.duration_slot;
            data.start_slot = storeData.start_slot;
            data.availability = storeData.availability_id;
            data.date = date?.split('T')?.[0];
            $q.use(
                ['post-assignment'],
                () => $r.post("{% url 'assignment-list' %}", data, {
                    "X-CSRFToken": "{{csrf_token}}"
                }),
                {
                    onSuccess(error){
                        form.reset();
                        id_new_schedule_modal.close();
                        $q.refetch("slots")
                    },
                    onError(error){
                        if (error.status !== 400) {
                            toastError("{% trans 'Error' %}!");
                            return
                        }

                        Object.entries(error.data).forEach(([key, value]) => {
                            const field = form.elements[key];
                            if (!field) {
                                toastError(value);
                            }
                            else {
                                const message = Array.isArray(value) ? value.join(', ') : value;
                                toastError(message)
                            }
                        });
                    }
                },
                {
                    ttl:0,
                }
            )
        }
        form.addEventListener('submit', form._handlerSubmit);
    }
    const modal = document.getElementById('id_new_schedule_modal')
    if (modal){
        modal.onclose = () => {
            form.reset();
            $s.set("create_asg_form.service", null)
            $s.set("create_asg_form.resources", {})
        }
    }
}
</script>
