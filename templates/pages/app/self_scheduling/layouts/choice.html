{% load i18n %}

<div class="w-full h-full grid grid-rows-[auto_1fr] bg-base-200/50"> <!-- Fundo levemente acinzentado para dar contraste aos cards -->
    
    <!-- Navbar -->
    <div class="navbar bg-base-100 shadow-md z-10 px-2 sm:px-4">
        <div class="navbar-start">
            <button class="btn btn-ghost btn-sm sm:btn-md gap-2 text-base-content/80 hover:text-base-content" onclick="history.go(-1)">
                {% include 'icons/undo-2.svg' %} 
                <span class="hidden xs:inline">{% trans 'Go back' %}</span>
            </button>
        </div>
        <div class="navbar-center max-w-[50%] text-center">
            <h1 class="text-base sm:text-lg font-bold truncate text-base-content">
                {{ title|default:_("Select an option") }}
            </h1>
        </div>
        <div class="navbar-end *:btn-ghost *:btn-sm sm:*:btn-md">
            {% include 'components/logout.html' %}
        </div>
    </div>

    <!-- Container da Listagem (Com rolagem independente garantida) -->
    <section class="w-full h-full overflow-y-auto p-4 sm:p-6 custom-scrollbar">
        <div class="max-w-2xl mx-auto w-full flex flex-col gap-3">
            
            <!-- Cabeçalho/Subtítulo da Lista -->
            <p class="px-2 text-xs sm:text-sm font-semibold text-base-content/60 uppercase tracking-wider">
                {{ list_title|default:_('Select one of the items below') }}
            </p>

            <!-- Lista de Opções -->
            <ul class="choice_options_serlf_schedule" id="id_{{ key }}">                
            </ul>
        </div>
    </section>
</div>
