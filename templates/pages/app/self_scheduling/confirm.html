{% extends 'pages/app/self_scheduling/index.html'%}
{% block content %}
{% get_current_language as LANG_CODE %}

<div class="min-h-screen bg-base-200 flex items-center justify-center p-4">
    <div class="w-full max-w-md flex flex-col items-center justify-center">

        <div id="loading_view" class="flex flex-col items-center gap-4 py-12">
            <span class="loading loading-spinner loading-lg text-primary"></span>
            <p class="text-base-content/70 text-sm animate-pulse">{%trans 'Processing your appointment'%}...</p>
        </div>

        <div id="error_view"
            class="hidden w-full bg-error/10 border border-error/20 p-6 rounded-2xl text-center shadow-sm">
            <div class="text-error mb-3 flex justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h3 class="text-lg font-semibold text-error mb-2">{% trans 'It was not possible to schedule.'%}</h3>
            <p id="error_text" class="text-base-content/80 text-sm mb-4"></p>
            <button onclick="window.location.reload()" class="btn btn-error btn-outline btn-sm">
                {% trans 'Try Again'%}
            </button>
        </div>

        <div id="ticket_view" class="hidden w-full">
            {% include 'pages/app/self_scheduling/ticket.html'%}
        </div>

    </div>
</div>

<script>
    // Captura inicial do assignmentId vindo da URL renderizada pelo Django
    const assignmentId = "{{request.GET.aid|escapejs}}";

    // Inicialização dos Estados
    $s.create('date', '{{request.GET.date}}')

    // Formatação reativa da data interna do ticket
    $s.subscribe('date', id_date_field, 'innerText', (v) => {
        if (!v) return '';
        const dateObj = new Date(`${v}T00:00:00`)
        return new Intl.DateTimeFormat('{{LANG_CODE}}', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric'
        }).format(dateObj)
    })

    // Elementos do DOM para controle de fluxo
    const viewLoading = document.getElementById('loading_view')
    const viewError = document.getElementById('error_view')
    const viewTicket = document.getElementById('ticket_view')
    const textError = document.getElementById('error_text')

    function switchView(state, errorMessage = '') {
        viewLoading.classList.add('hidden')
        viewError.classList.add('hidden')
        viewTicket.classList.add('hidden')

        if (state === 'LOADING') {
            viewLoading.classList.remove('hidden')
        } else if (state === 'SUCCESS') {
            viewTicket.classList.remove('hidden')
        } else if (state === 'ERROR') {
            if (textError) textError.innerText = errorMessage
            viewError.classList.remove('hidden')
        }
    }

    // Execução Dinâmica do Request (GET ou POST)
    $q.use(
        ['fetch_or_create_appointment'],
        () => {
            switchView('LOADING')

            // CASO 1: Se houver ID na URL, faz a busca (GET)
            if (assignmentId) {
                // Nota: Ajuste a URL se a sua API exigir o ID no path (ex: `.../client_assignment-list/${assignmentId}/`)
                return $r.get('{% url "client_assignment-detail" 0 %}'.replace('0', assignmentId))
            }

            // CASO 2: Se não houver ID, mantém o fluxo original de criação (POST)
            return $r.post('{% url "client_assignment-list" %}', {
                'service': Number('{{request.GET.service|escapejs}}'),
                'resources': '{{request.GET.resource|escapejs}}'.split(',').map(Number).filter(it => !!it),
                'date': '{{request.GET.date|escapejs}}',
                'availability': '{{request.GET.availability|escapejs}}',
                'start_slot': '{{request.GET.slot|escapejs}}',
            },
                {"X-CSRFToken": "{{csrf_token}}"}
            )
        },
        {
            onSuccess(response) {
                // Tratamento caso a API retorne uma lista no GET em vez de um objeto direto
                const data = Array.isArray(response) ? response[0] : response;

                if (!data || !data.id) {
                    switchView('ERROR', 'Agendamento não encontrado.')
                    return;
                }

                // Se os dados vieram do GET, pode ser necessário atualizar a data no estado reativo
                if (data.date) {
                    $s.set('date', data.date);
                }

                switchView('SUCCESS')

                // Atualização dos elementos do ticket
                const a = document.getElementById('id_a_download_ticker')
                const g_a = document.getElementById('id_btn_google_calendar_link')

                if (a) {
                    a.href = "{% url 'assignment-ticker-download' 0%}".replace('0', data.id)
                }
                if (g_a && data.google_calendar_link) {
                    g_a.href = data.google_calendar_link
                }

                // ATUALIZAÇÃO DA URL SEM REFRESH (Apenas se já não estiver na URL)
                if (!assignmentId) {
                    const currentUrl = new URL(window.location.href);
                    currentUrl.searchParams.set('aid', data.id);
                    window.history.replaceState({}, '', currentUrl.toString());
                }
            },
            onError(error) {
                const msg = error?.response?.data?.detail || 'Ocorreu um erro ao processar a requisição ou os dados são inválidos.'
                switchView('ERROR', msg)
            },
            onFinally() {
                // Mantido vazio conforme arquitetura original
            }
        }
    )
</script>
{% endblock %}
