{% load i18n %}
{% get_current_language as LANG_CODE %}
<div class="grid grid-cols-[16rem_1fr]  h-full">
<fieldset class="p-4 border-r border-base-content/10">
  <!-- CALENDAR -->
  <app-state name="f-calendar" value="{% now 'c'%}"></app-state>
  <div class="w-full grid grid-cols-7">
    <div class="col-span-7 flex gap-2">
      <span
        class="text-sm flex-1"
        data-state="f-calendar"
        data-then="iso => {
          const d = new Date(iso);
          const f = new Intl.DateTimeFormat('{{LANG_CODE}}', {
              month: 'long',
              year: 'numeric'
          });
          return f.format(d);
        }"
      ></span>
      <button class="btn btn-flat btn-xs"> Today </button>
      <button class="btn btn-ghost btn-xs btn-square"> {% include 'icons/chevron-left.svg' %} </button>
      <button class="btn btn-ghost btn-xs btn-square"> {% include 'icons/chevron-right.svg' %} </button>
      
    </div>
  </div>
</fieldset>
<main>
</main>
</div>
